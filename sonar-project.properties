# SonarQube configuration — honest analysis.
# Test files are classified as TESTS (still analyzed for code smells & duplication —
# nothing is excluded from issue analysis). Coverage is measured on main code only;
# only genuinely non-coverable files (entry point, barrel re-exports, type-only files)
# are excluded from the coverage denominator.
sonar.projectKey=vite-boilerplate-scss
sonar.projectName=Vite Boilerplate SCSS (Frontend)
sonar.projectVersion=1.0.0

# Main vs test code (a file is either source or test; test.inclusions reclassify).
sonar.sources=src,e2e
sonar.tests=src,e2e
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,e2e/**,src/shared/test/**
sonar.exclusions=**/node_modules/**,e2e/playwright-report/**,e2e/test-results/**
sonar.sourceEncoding=UTF-8

# Coverage (jest lcov). Exclude only non-coverable main files.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/index.ts,src/main.tsx,**/*.d.ts,src/vite-env.d.ts,src/i18n/ports/**,src/i18n/types/**

sonar.typescript.tsconfigPaths=tsconfig.json
