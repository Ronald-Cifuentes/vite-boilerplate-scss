# Security headers, included at server level AND inside every location that
# declares its own add_header — nginx's add_header inheritance REPLACES all
# parent headers the moment a location adds one, silently dropping these.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HSTS (SEC-010): Enable when TLS terminator is in place
# Only applies behind HTTPS - browsers ignore this header on HTTP
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Permissions-Policy (SEC-011): geolocation is USED by GPS adapter (src/geo-detection/adapters/GpsAdapter.ts)
add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

# CSP (SEC-009): FOUC script uses 'unsafe-inline' (theme FOUC prevention in index.html lines 23-43)
# Trade-off: FOUC prevention requires synchronous inline script before React hydration.
# Alternative (script-src hash) would require rebuilding CSP on every FOUC script change.
# Risk accepted: inline script has explicit allowlist validation (stored === 'light' || 'dark').
# connect-src: 5 external API origins (ADR-0014 IP geo, ADR-0010 exchange rates) + self
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.country.is https://get.geojs.io https://api.bigdatacloud.net https://suameca.banrep.gov.co https://www.banxico.org.mx;" always;
