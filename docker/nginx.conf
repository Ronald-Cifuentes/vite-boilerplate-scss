user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    server {
        listen       80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HSTS (SEC-010): Enable when TLS terminator is in place
        # Only applies behind HTTPS - browsers ignore this header on HTTP
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Permissions-Policy (SEC-011): geolocation is USED by GPS adapter (src/geo-detection/adapters/GpsAdapter.ts)
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

        # CSP (SEC-009): FOUC script uses 'unsafe-inline' (theme FOUC prevention in index.html lines 23-43)
        # Trade-off: FOUC prevention requires synchronous inline script before React hydration.
        # Alternative (script-src hash) would require rebuilding CSP on every FOUC script change.
        # Risk accepted: inline script has explicit allowlist validation (stored === 'light' || 'dark').
        # connect-src: 5 external API origins (ADR-0014 IP geo, ADR-0010 exchange rates) + self
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.country.is https://get.geojs.io https://api.bigdatacloud.net https://suameca.banrep.gov.co https://www.banxico.org.mx;" always;

        # Cache hashed assets aggressively (Vite emits content-hash filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for index.html (SPA entrypoint must be fresh)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # SPA fallback: all non-file routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint for orchestrators
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
