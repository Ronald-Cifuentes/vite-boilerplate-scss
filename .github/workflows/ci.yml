name: CI Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: '24'

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full history for SonarQube analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm via corepack (reads packageManager from package.json)
        uses: pnpm/action-setup@v6
        # No version specified - pnpm/action-setup reads "packageManager" field from package.json
        # Single source of truth: package.json declares pnpm@11.5.1

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('package.json', 'e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        # No lockfile by owner directive (package-manager-agnostic template) —
        # installs resolve fresh from package.json
        run: pnpm install

      - name: Dependency check (HIGH-004 parity with pre-commit)
        run: pnpm depcheck

      - name: Format check
        run: ./node_modules/.bin/prettier --check .

      - name: Lint
        run: ./node_modules/.bin/eslint src

      - name: Empty CSS rulesets gate
        run: pnpm check:css

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Unit tests + Coverage
        run: ./node_modules/.bin/jest --coverage --ci --maxWorkers=2

      - name: Enforce 100% coverage
        # Reads the machine-readable summary (json-summary reporter) — the old
        # HTML grep matched nothing in istanbul's markup and could never fail.
        run: |
          node -e '
            const { total } = require("./coverage/coverage-summary.json");
            const metrics = ["statements", "branches", "functions", "lines"];
            const failed = metrics.filter(m => total[m].pct < 100);
            metrics.forEach(m => console.log(`${m}: ${total[m].pct}%`));
            if (failed.length) { console.error("ERROR: below 100%:", failed.join(", ")); process.exit(1); }
          '

      - name: Build production bundle
        run: ./node_modules/.bin/vite build

      - name: Enforce bundle budgets (HIGH-002)
        run: ./scripts/check-budgets.sh

      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          pnpm install --ignore-workspace
          ./node_modules/.bin/playwright install chromium --with-deps

      - name: Run e2e tests
        # playwright.config.cjs owns the server (webServer builds with the e2e
        # mock token and starts preview; reuseExistingServer=false in CI). A
        # pre-started server would collide on the port AND serve a tokenless build.
        working-directory: e2e
        run: ./node_modules/.bin/playwright test --config playwright.config.cjs

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "WARNING: SONARQUBE_TOKEN or SONARQUBE_URL not set. Skipping SonarQube scan."
            exit 0
          fi
          pnpm dlx sonarqube-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN" \
            -Dsonar.projectKey=vite-boilerplate-scss \
            -Dsonar.sources=src \
            -Dsonar.tests=src \
            -Dsonar.test.inclusions='**/*.spec.ts,**/*.spec.tsx,e2e/**' \
            -Dsonar.exclusions='**/*.spec.ts,**/*.spec.tsx,**/index.ts,src/main.tsx,**/*.d.ts,src/shared/test/**,templates/**,dist/**,coverage/**,node_modules/**' \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: vite-boilerplate-scss:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: runtime
          load: true

      - name: Verify non-root user
        run: |
          USER_ID=$(docker inspect vite-boilerplate-scss:${{ github.sha }} | jq -r '.[0].Config.User')
          if [ "$USER_ID" = "root" ] || [ "$USER_ID" = "" ] || [ "$USER_ID" = "0" ]; then
            echo "ERROR: Docker image runs as root (User='$USER_ID')"
            exit 1
          fi
          echo "OK: Image runs as non-root user: $USER_ID"

      - name: Scan for secrets in image layers
        run: |
          if docker history vite-boilerplate-scss:${{ github.sha }} --no-trunc | grep -iE '(secret|password|token|api_key|bearer)'; then
            echo "ERROR: Found potential secrets in image layers"
            exit 1
          fi
          echo "OK: No secrets found in image layers"

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: vite-boilerplate-scss:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Container vulnerability gate
        id: trivy-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: vite-boilerplate-scss:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        # Report step always succeeds and runs before the gate; upload even when
        # findings exist (especially then — Security tab needs the data). Guard
        # on file existence in case the build itself failed.
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM (CycloneDX via Trivy)
        # The previous cyclonedx-node:latest step was doubly broken: its CLI
        # (make-bom) accepts neither --output-file nor --spec-version, and this
        # job never installs node_modules for it to analyze. Trivy (already
        # pinned above) produces a CycloneDX SBOM from the built image itself.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: vite-boilerplate-scss:${{ github.sha }}
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 30
