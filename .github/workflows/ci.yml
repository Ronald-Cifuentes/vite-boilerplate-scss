name: CI Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: '24.18.0'
  PNPM_VERSION: '9'

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for SonarQube analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack for pnpm
        run: corepack enable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --pm-on-fail=ignore

      - name: Format check
        run: ./node_modules/.bin/prettier --check .

      - name: Lint
        run: ./node_modules/.bin/eslint src

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Unit tests + Coverage
        run: ./node_modules/.bin/jest --coverage --ci --maxWorkers=2

      - name: Enforce 100% coverage
        run: |
          COVERAGE_STATEMENTS=$(grep -oP 'Statements\s+:\s+\K[0-9.]+' coverage/lcov-report/index.html | head -1)
          COVERAGE_BRANCHES=$(grep -oP 'Branches\s+:\s+\K[0-9.]+' coverage/lcov-report/index.html | head -1)
          COVERAGE_FUNCTIONS=$(grep -oP 'Functions\s+:\s+\K[0-9.]+' coverage/lcov-report/index.html | head -1)
          COVERAGE_LINES=$(grep -oP 'Lines\s+:\s+\K[0-9.]+' coverage/lcov-report/index.html | head -1)
          echo "Coverage: Statements=$COVERAGE_STATEMENTS% Branches=$COVERAGE_BRANCHES% Functions=$COVERAGE_FUNCTIONS% Lines=$COVERAGE_LINES%"
          if (( $(echo "$COVERAGE_STATEMENTS < 100" | bc -l) )) || \
             (( $(echo "$COVERAGE_BRANCHES < 100" | bc -l) )) || \
             (( $(echo "$COVERAGE_FUNCTIONS < 100" | bc -l) )) || \
             (( $(echo "$COVERAGE_LINES < 100" | bc -l) )); then
            echo "ERROR: Coverage below 100%"
            exit 1
          fi

      - name: Build production bundle
        run: ./node_modules/.bin/vite build

      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          pnpm install --frozen-lockfile --pm-on-fail=ignore --ignore-workspace
          ./node_modules/.bin/playwright install chromium --with-deps

      - name: Start preview server for e2e
        run: |
          ./node_modules/.bin/vite preview --port 4173 &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -s http://localhost:4173 > /dev/null; do sleep 1; done'

      - name: Run e2e tests
        working-directory: e2e
        run: ./node_modules/.bin/playwright test --config playwright.config.cjs
        env:
          BASE_URL: http://localhost:4173

      - name: Stop preview server
        if: always()
        run: |
          if [ -n "$PREVIEW_PID" ]; then kill $PREVIEW_PID || true; fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "WARNING: SONARQUBE_TOKEN or SONARQUBE_URL not set. Skipping SonarQube scan."
            exit 0
          fi
          pnpm --pm-on-fail=ignore dlx sonarqube-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN" \
            -Dsonar.projectKey=vite-boilerplate-scss \
            -Dsonar.sources=src \
            -Dsonar.tests=src \
            -Dsonar.test.inclusions='**/*.spec.ts,**/*.spec.tsx,e2e/**' \
            -Dsonar.exclusions='**/*.spec.ts,**/*.spec.tsx,**/index.ts,src/main.tsx,**/*.d.ts,src/shared/test/**,templates/**,dist/**,coverage/**,node_modules/**' \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: vite-boilerplate-scss:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify non-root user
        run: |
          USER_ID=$(docker inspect vite-boilerplate-scss:${{ github.sha }} | jq -r '.[0].Config.User')
          if [ "$USER_ID" = "root" ] || [ "$USER_ID" = "" ] || [ "$USER_ID" = "0" ]; then
            echo "ERROR: Docker image runs as root (User='$USER_ID')"
            exit 1
          fi
          echo "OK: Image runs as non-root user: $USER_ID"

      - name: Scan for secrets in image layers
        run: |
          if docker history vite-boilerplate-scss:${{ github.sha }} --no-trunc | grep -iE '(secret|password|token|api_key|bearer)'; then
            echo "ERROR: Found potential secrets in image layers"
            exit 1
          fi
          echo "OK: No secrets found in image layers"

      - name: Container vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vite-boilerplate-scss:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM (CycloneDX)
        run: |
          docker run --rm -v $(pwd):/scan \
            cyclonedx/cyclonedx-node:latest \
            --output-file /scan/sbom.json \
            --spec-version 1.4 \
            /scan
          if [ ! -f sbom.json ]; then
            echo "ERROR: SBOM generation failed"
            exit 1
          fi
          echo "OK: SBOM generated at sbom.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 30
